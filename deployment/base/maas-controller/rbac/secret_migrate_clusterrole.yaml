apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: maas-controller-secret-migrate-role
rules:
# Database configuration secret migration (infrastructure namespace separation)
# Note: resourceNames cannot restrict 'create' (resource doesn't exist yet),
# so create is in a separate rule. Only delete is scoped to maas-db-config.
- apiGroups: [""]
  resources: ["secrets"]
  verbs: ["create"]
- apiGroups: [""]
  resources: ["secrets"]
  resourceNames: ["maas-db-config"]
  verbs: ["delete"]
