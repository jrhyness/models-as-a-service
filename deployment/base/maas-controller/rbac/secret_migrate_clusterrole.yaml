apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: maas-controller-secret-migrate-role
rules:
# Database configuration secret migration (infrastructure namespace separation)
# Scoped to maas-db-config only for security
- apiGroups: [""]
  resources: ["secrets"]
  resourceNames: ["maas-db-config"]
  verbs: ["create", "delete"]
